name: Package and Publish Extension

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: save-to-local-history-vsix
          path: "*.vsix"

      - name: Verify Open VSX token
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT repository secret is required for tag-based publishing."
            exit 1
          fi

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" ./*.vsix \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" ./*.vsix \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Save to Local History ${GITHUB_REF_NAME}" \
              --notes "Automated release for ${GITHUB_REF_NAME}." \
              --latest
          fi

      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish ./*.vsix --pat "$OVSX_PAT" --skip-duplicate
